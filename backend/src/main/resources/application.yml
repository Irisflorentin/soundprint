server:
  port: 8080
  servlet:
    context-path: /              # 根路径，前端访问 http://localhost:8080/api/...

spring:
  application:
    name: soundprint
  profiles:
    active: dev                  # 默认激活 dev 环境
  servlet:
    multipart:
      max-file-size: 200MB       # 单文件上传上限（FLAC 文件可能 50MB+）
      max-request-size: 500MB    # 单请求上限
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 全局配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true     # 下划线自动转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出
  global-config:
    db-config:
      id-type: AUTO              # 主键自增
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志
logging:
  level:
    com.soundprint: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
  documents:
    - group: 默认
      name: Soundprint API
      locations: classpath:markdown/*
