server:
  port: 8080
  servlet:
    context-path: /              # 根路径，前端访问 http://localhost:8080/api/...

spring:
  application:
    name: soundprint
  profiles:
    active: dev                  # 默认激活 dev 环境
  servlet:
    multipart:
      max-file-size: 200MB       # 单文件上传上限（FLAC 文件可能 50MB+）
      max-request-size: 500MB    # 单请求上限
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 全局配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true     # 下划线自动转驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出
  global-config:
    db-config:
      id-type: AUTO              # 主键自增
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志
logging:
  level:
    com.soundprint: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Knife4j API 文档
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: true
  documents:
    - group: 默认
      name: Soundprint API
      locations: classpath:markdown/*

# ========== Soundprint 业务配置 ==========
soundprint:
  storage:
    base-dir: D:/soundprint-storage              # 文件存储根目录
    audio-dir: D:/soundprint-storage/audio       # 音频文件
    cover-dir: D:/soundprint-storage/cover       # 封面图片
    avatar-dir: D:/soundprint-storage/avatar     # 头像
    conversion-dir: D:/soundprint-storage/conversion  # 转换后的文件
    temp-dir: D:/soundprint-storage/temp         # 临时文件
  upload:
    max-file-size: 200MB
    allowed-audio-formats: flac,mp3,wav,aac,ogg,m4a
    allowed-image-formats: jpg,jpeg,png,webp
  current-user-id: 1   # 临时方案：默认用户 1，Phase 4 加登录后改成从 SecurityContext 取
