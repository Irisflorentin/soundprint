services:
  mysql:
    image: mysql:8.0
    container_name: soundprint-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-soundprint}
      MYSQL_USER: ${MYSQL_USER:-soundprint}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-soundprint123}
      TZ: ${TZ:-Asia/Shanghai}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:3308:3306"
    networks:
      - soundprint-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soundprint-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_DATABASE: ${MYSQL_DATABASE:-soundprint}
      MYSQL_USER: ${MYSQL_USER:-soundprint}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-soundprint123}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - "${SOUNDPRINT_STORAGE_PATH:-D:/soundprint-storage}:/data/storage"
    networks:
      - soundprint-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: soundprint-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - soundprint-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mysql-data:
    name: soundprint-mysql-data

networks:
  soundprint-network:
    name: soundprint-network
    driver: bridge
